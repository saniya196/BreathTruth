<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BreathTruth | Report Pollution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">BreathTruth</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="report.html">Report Now</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Live Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="gap.html">The Gap</a></li>
          <li class="nav-item"><a class="nav-link" href="timeline.html">Timeline</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-header">
    <div class="container py-5">
      <h1 class="fw-bold">Report Your Air</h1>
      <p class="lead mb-0">Submit an anonymous pollution report from your area.</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form id="reportForm" novalidate>

                <div class="mb-3">
                  <label for="name" class="form-label fw-semibold">Name</label>
                  <input type="text" id="name" class="form-control" placeholder="Enter your name or leave blank for anonymous">
                  <div class="error-message" id="nameError"></div>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label fw-semibold">Email</label>
                  <input type="email" id="email" class="form-control" placeholder="Enter email (optional)">
                  <div class="error-message" id="emailError"></div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">Symptoms Experienced</label>
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Burning Eyes" id="burningEyes">
                        <label class="form-check-label" for="burningEyes">Burning Eyes</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Difficulty Breathing" id="difficultyBreathing">
                        <label class="form-check-label" for="difficultyBreathing">Difficulty Breathing</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Unusual Smell" id="unusualSmell">
                        <label class="form-check-label" for="unusualSmell">Unusual Smell</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Visible Haze" id="visibleHaze">
                        <label class="form-check-label" for="visibleHaze">Visible Haze</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Headache" id="headache">
                        <label class="form-check-label" for="headache">Headache</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input symptom" type="checkbox" value="Black Smoke" id="blackSmoke">
                        <label class="form-check-label" for="blackSmoke">Black Smoke</label>
                      </div>
                    </div>
                  </div>
                  <div class="error-message" id="symptomError"></div>
                </div>

                <div class="mb-3">
                  <label for="severity" class="form-label fw-semibold">Severity</label>
                  <select id="severity" class="form-select">
                    <option value="">Select Severity</option>
                    <option value="Mild">Mild</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Severe">Severe</option>
                  </select>
                  <div class="error-message" id="severityError"></div>
                </div>

                <div class="mb-3">
                  <label for="location" class="form-label fw-semibold">Location / Area</label>
                  <input type="text" id="location" class="form-control" placeholder="Enter your area (e.g. Patancheru, Madhapur)">
                  <div class="error-message" id="locationError"></div>
                </div>

                <div class="mb-3">
                  <label for="pincode" class="form-label fw-semibold">Pincode</label>
                  <input type="text" id="pincode" class="form-control" placeholder="Enter 6-digit pincode">
                  <div class="error-message" id="pincodeError"></div>
                </div>

                <div class="mb-3">
                  <label for="description" class="form-label fw-semibold">Description</label>
                  <textarea id="description" rows="4" class="form-control" placeholder="Describe what you observed"></textarea>
                  <div class="error-message" id="descriptionError"></div>
                </div>

                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" id="terms">
                  <label class="form-check-label" for="terms">
                    I confirm that the information provided is true to the best of my knowledge.
                  </label>
                  <div class="error-message" id="termsError"></div>
                </div>

                <button type="submit" class="btn btn-warning w-100 fw-semibold">
                  Submit Anonymous Report
                </button>

                <div id="successMessage" class="success-message mt-3"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="py-4 footer-dark">
    <div class="container text-center">
      <p class="mb-1 fw-semibold">BreathTruth</p>
      <p class="mb-0 small text-light-emphasis">
        Community-driven air quality awareness platform
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
